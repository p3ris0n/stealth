name: Publish crypto 50 issue campaign

on:
  push:
    branches: [main]
    paths:
      - "scripts/publish-crypto-50-issues.mjs"
      - ".github/workflows/publish-crypto-50-issues.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: publish-crypto-50-issues
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate exactly fifty detailed crypto drafts
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const sourcePath = 'scripts/publish-crypto-50-issues.mjs';
          let source = fs.readFileSync(sourcePath, 'utf8');
          source = source.replace('const issues = [', 'const allIssues = [');
          source = source.replace(
            'if (issues.length !== 50) {',
            'const issues = allIssues.slice(0, 50);\n\nif (issues.length !== 50) {'
          );
          fs.writeFileSync('/tmp/publish-crypto-50-issues.mjs', source);
          NODE
          node /tmp/publish-crypto-50-issues.mjs
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('stealth-crypto-50-issue-drafts.json', 'utf8'));
          if (!Array.isArray(data.issues) || data.issues.length !== 50) {
            throw new Error(`Expected exactly 50 crypto issues, found ${data.issues?.length ?? 'none'}`);
          }
          const titles = data.issues.map((issue) => issue.title.trim());
          if (new Set(titles).size !== titles.length) throw new Error('Duplicate crypto titles found');
          for (const issue of data.issues) {
            if (!issue.title || !issue.body || !Array.isArray(issue.labels) || !issue.area) {
              throw new Error(`Malformed draft: ${issue.draft_id ?? issue.title ?? 'unknown'}`);
            }
            if (!issue.body.includes('## Repository evidence') || !issue.body.includes('## Acceptance criteria')) {
              throw new Error(`Insufficiently detailed draft: ${issue.draft_id}`);
            }
          }
          NODE

      - name: Create missing crypto issues without duplicates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('stealth-crypto-50-issue-drafts.json', 'utf8'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const existingItems = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            });
            const existingTitles = new Set(existingItems.map((item) => item.title.trim()));

            const labelDefinitions = {
              'Maybe Rewarded': { color: 'fbca04', description: 'Potentially rewardable contributor issue' },
              'GrantFox OSS': { color: '5319e7', description: 'GrantFox open-source contribution issue' },
              'Official Campaign | FWC26': { color: 'fbca04', description: 'Official FWC26 campaign issue.' },
              'cryptography': { color: 'b60205', description: 'Cryptography, encryption, signatures, and key-management work.' },
            };

            const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const labelNames = new Set(existingLabels.map((label) => label.name));

            for (const [name, definition] of Object.entries(labelDefinitions)) {
              if (!labelNames.has(name)) {
                await github.rest.issues.createLabel({ owner, repo, name, ...definition });
                labelNames.add(name);
              }
            }

            let created = 0;
            let skipped = 0;
            const createdIssues = [];

            for (const draft of data.issues) {
              const title = draft.title.trim();
              if (existingTitles.has(title)) {
                core.info(`Skipping exact-title duplicate: ${title}`);
                skipped += 1;
                continue;
              }

              const response = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: draft.body,
                labels: [...new Set(draft.labels)],
              });

              existingTitles.add(title);
              created += 1;
              createdIssues.push(`#${response.data.number} ${title}`);
              core.info(`Created #${response.data.number}: ${title}`);
            }

            await core.summary
              .addHeading('Crypto issue campaign publication complete')
              .addRaw(`Drafts validated: ${data.issues.length}\n\n`)
              .addRaw(`Created: ${created}\n\n`)
              .addRaw(`Skipped exact-title duplicates: ${skipped}\n\n`)
              .addHeading('Created issues', 2)
              .addList(createdIssues.length ? createdIssues : ['No new issues were required.'])
              .write();
